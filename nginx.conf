# ================================================
# JP's Mobile Detailing LLC — Nginx Config
# ================================================
# This file is for reference. The actual active
# config is at /etc/nginx/sites-available/jpsmobiledetailing
#
# To set up: run  ./setup-nginx.sh
# ================================================

server {
    listen 80;
    listen [::]:80;

    # ── For localhost testing ──────────────────
    server_name localhost;

    # ── Change this to your domain when ready ──
    # server_name jpsmobiledetailing.org www.jpsmobiledetailing.org;

    root /home/parallels/jpsmobiledetailing;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Handle HTML pages cleanly (no .html required in URL)
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Error pages
    error_page 404 /404.html;
}
